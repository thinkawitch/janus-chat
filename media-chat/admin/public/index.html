<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MC Admin</title>
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" media="screen" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/webrtc-adapter/8.1.1/adapter.min.js"></script>
    <script type="text/javascript" src="/js/vendor/janus.js"></script>
    <style>
        /* page styles */
        html, body {
            height: 100%;
            /*background-color: #000;*/ /* for ios side areas */
        }
        header {
            background: lightsteelblue;
        }
        main {
            background: aliceblue;
            min-height: 250px;
        }
        footer {
            background: lightsteelblue;
        }
    </style>
    <link rel="stylesheet" href="css/the-admin.css?a1" crossorigin="anonymous" media="screen">
</head>
<body>
<div class="container-md d-flex flex-column h-100">
    <header class="d-flex align-items-center justify-content-center p-0">
        <img height="30px" src="/apple-touch-icon.png" />
        <h1 class="ms-3">MC Admin</h1> <!-- vertical align seems incorrect -->
        <span class="ms-3 fs-3">MC Admin</span>
    </header>
    <main class="flex-grow-1 p-2">

        <div class="d-flex h-100">
            <div class="card flex-grow-1">
                <div class="card-header">The place for app</div>
                <div class="card-body" id="the-app">

                    <!-- place app here -->
                    <!-- loader spinner as placeholder -->
                    <div class="d-flex flex-row d-flex justify-content-center h-100">
                        <div class="d-flex align-items-center text-secondary">
                            <span>Loading...</span>
                            <div class="spinner-border ms-2" role="status" aria-hidden="true"></div>
                        </div>
                    </div>

                </div>
            </div>
            <div class="card ms-2">
                <div class="card-header">Other page content</div>

                <ul class="list-group list-group-flush">
                    <li class="list-group-item">An item</li>
                    <li class="list-group-item">A second item</li>
                    <li class="list-group-item">A third item</li>
                </ul>

            </div>
        </div>
    </main>
    <footer class="text-center">
        Some footer text
    </footer>
</div>
<script type="module">

</script>
</body>
</html>
